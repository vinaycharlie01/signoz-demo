apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-bootstrap
  namespace: argocd
spec:
  project: observability
  source:
    repoURL: git@github.com:vinaycharlie01/eh-fleets.git
    targetRevision: dev
    path: infrastructure/base/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
