# containerd v2 hosts.toml for registry.k8s.io
# skip_verify bypasses TLS certificate validation for corporate/VPN proxy environments.
# SECURITY NOTE: for local dev/demo only — do NOT use in production.

server = "https://registry.k8s.io"

[host."https://registry.k8s.io"]
  capabilities = ["pull", "resolve"]
  skip_verify = true
