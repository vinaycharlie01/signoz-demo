# Base values for the SigNoz k8s-infra Helm chart.
# This chart deploys an OpenTelemetry Collector DaemonSet that scrapes
# Kubernetes pod logs and forwards them to the SigNoz ingester.
#
# Chart:  signoz/k8s-infra
# Docs:   https://signoz.io/docs/userguide/collect_kubernetes_pod_logs/

global:
  # Cloud endpoint — overridden per-environment.
  # For self-hosted, this should point to the SigNoz OTLP endpoint.
  clusterName: ""

presets:
  logsCollection:
    # Collect logs from all pods (except blacklisted ones below).
    enabled: true
    blacklist:
      enabled: true
      # Exclude SigNoz's own telemetry from the collected logs.
      signozLogs: true
      # Exclude noisy system namespaces.
      namespaces:
        - kube-system
      # Exclude demo load generators (avoid ingesting their own noise).
      pods:
        - hotrod
        - locust
      containers: []
      additionalExclude: []

  # Collect host/node metrics (CPU, memory, disk, network).
  hostMetrics:
    enabled: true

  # Collect Kubernetes infrastructure metrics (pods, nodes, deployments).
  kubeletMetrics:
    enabled: true

  # Collect cluster-level metrics (namespace count, node conditions, etc.).
  clusterMetrics:
    enabled: true

  # Tail Kubernetes events as structured log records.
  k8sEvents:
    enabled: true

  # kubernetesAttributes adds k8s metadata to every log/metric/trace record.
  # The default extractMetadatas list omits k8s.container.name, which is
  # required for per-container filtering in the SigNoz Logs dashboard.
  kubernetesAttributes:
    enabled: true
    passthrough: false
    extractMetadatas:
      - k8s.namespace.name
      - k8s.deployment.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.cronjob.name
      - k8s.job.name
      - k8s.node.name
      - k8s.node.uid
      - k8s.pod.name
      - k8s.pod.uid
      - k8s.pod.start_time
      - k8s.container.name     # ← required for per-container view in SigNoz Logs
