# k3d registries configuration — corporate/VPN TLS proxy workaround
#
# This file configures containerd inside k3d nodes to skip TLS certificate
# verification when pulling images. This is required on networks that use a
# TLS-intercepting proxy (corporate VPN, Zscaler, etc.) whose CA is not
# trusted by the k3d node's built-in certificate bundle.
#
# k3d mounts this file into every node at cluster creation time via:
#   k3d cluster create --registry-config self-hosted/registries.yaml
#
# The cluster.registryConfig field in k3d.yaml references this file so that
# `mage cluster:up` picks it up automatically.
#
# SECURITY NOTE: skip_verify = true disables TLS certificate validation for
# these registries. This is intentional for local dev/demo environments only.
# Do NOT use this in production.

mirrors:
  "registry.k8s.io":
    endpoint:
      - "https://registry.k8s.io"
  "docker.io":
    endpoint:
      - "https://registry-1.docker.io"
  "ghcr.io":
    endpoint:
      - "https://ghcr.io"
  "quay.io":
    endpoint:
      - "https://quay.io"

configs:
  "registry.k8s.io":
    tls:
      insecure_skip_verify: true
  "docker.io":
    tls:
      insecure_skip_verify: true
  "ghcr.io":
    tls:
      insecure_skip_verify: true
  "quay.io":
    tls:
      insecure_skip_verify: true
