apiVersion: apps/v1
kind: Deployment
metadata:
  name: signoz-demo
  namespace: signoz-demo
  labels:
    app.kubernetes.io/name: signoz-demo
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: signoz-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signoz-demo
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signoz-demo
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: signoz-demo
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/vinaycharlie01/signoz-demo:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: HTTP_ADDR
              value: ":8090"
            - name: DB_PATH
              value: "/data/orders.db"
            - name: OTEL_SERVICE_NAME
              value: "signoz-demo-order-service"
            - name: DEPLOYMENT_ENVIRONMENT
              value: "k3d-local"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "signoz-ingester.signoz.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: signoz-demo-data
