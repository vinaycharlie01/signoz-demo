apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Image tag pinned to the sha published by CI.
# For local k3d, the image is pre-imported via docker save + ctr import
# so imagePullPolicy is set to IfNotPresent to skip the GHCR pull.
images:
  - name: ghcr.io/vinaycharlie01/signoz-demo
    newTag: sha-cb0f96f

patches:
  # Patch ingress host to nip.io wildcard DNS for local browser access.
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: signoz-demo.127.0.0.1.nip.io
    target:
      kind: Ingress
      name: signoz-demo

  # Use locally-imported image — skip GHCR pull (avoids TLS issues on corporate networks).
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
    target:
      kind: Deployment
      name: signoz-demo
