# signoz-demo — application-only compose file.
#
# Prerequisites
# -------------
# The SigNoz Foundry stack (ClickHouse, ClickHouse Keeper, signoz-otel-collector
# ingester, Postgres, and the SigNoz UI) must already be running.  Start it once
# from the repo root:
#
#   cd /path/to/foundry
#   docker compose -f pours/deployment/compose.yaml up -d
#
# That stack creates the "signoz-network" Docker network and exposes the
# OTLP ingester on ports 4317 (gRPC) and 4318 (HTTP) inside that network
# (container alias: signoz-ingester) and also on the host loopback.
#
# This file ONLY starts the Order Service application.  It attaches to the
# already-existing "signoz-network" so the app can reach the ingester by its
# in-network alias (signoz-ingester:4317) without any extra port-forwarding.

networks:
  signoz-network:
    external: true   # must exist — created by the Foundry compose stack

services:
  app:
    build: .
    container_name: signoz-demo-app
    networks:
      - signoz-network
    ports:
      - "8090:8090"
    environment:
      # ── Application ────────────────────────────────────────────────────────
      HTTP_ADDR: ":8090"
      DB_PATH: /data/orders.db

      # ── OpenTelemetry ───────────────────────────────────────────────────────
      # Service identity — shows up in SigNoz → Services and on every span/log.
      OTEL_SERVICE_NAME: signoz-demo-order-service
      SERVICE_VERSION: "0.1.0"
      DEPLOYMENT_ENVIRONMENT: docker-compose

      # Send all three signals (traces, metrics, logs) to the Foundry ingester.
      # Inside signoz-network the ingester is reachable by its alias; gRPC port.
      OTEL_EXPORTER_OTLP_ENDPOINT: signoz-ingester:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"

    volumes:
      - app-data:/data

    restart: unless-stopped

volumes:
  app-data:
