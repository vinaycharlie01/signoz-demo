name: CI

on:
  push:
    branches: ["main", "dev", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.25"
  MAGE_VERSION: "v1.17.2"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Build the Go binaries, then build & publish
  # the multi-arch container image to GHCR.
  # ─────────────────────────────────────────────
  build-and-publish:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}

      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}

      # Cross-compile for linux/amd64 and linux/arm64.
      # The Dockerfile copies the prebuilt binary — no build step inside Docker.
      - name: Cross-compile linux binaries
        run: mage go:crossBuild

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we are actually going to push (i.e. not on a PR).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produce tags:
      #   branch push  → ghcr.io/…/signoz-demo:main  (or :dev)
      #   PR           → ghcr.io/…/signoz-demo:pr-42
      #   semver tag   → ghcr.io/…/signoz-demo:1.2.3
      #   always       → ghcr.io/…/signoz-demo:sha-abc1234
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          # Push on branch push; build-only on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
