name: CI

on:
  push:
    branches: ["main", "dev", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.25"
  MAGE_VERSION: "v1.17.2"

jobs:
  # ─────────────────────────────────────────────
  # Build the Go binaries, then build & publish
  # the multi-arch container image to GHCR.
  # ─────────────────────────────────────────────
  build-and-publish:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache mage
        id: cache-mage
        uses: actions/cache@v4
        with:
          path: ~/go/bin/mage
          key: mage-${{ runner.os }}-${{ env.MAGE_VERSION }}

      - name: Install mage
        if: steps.cache-mage.outputs.cache-hit != 'true'
        run: go install github.com/magefile/mage@${{ env.MAGE_VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we are actually going to push (i.e. not on a PR).
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Cross-compiles linux/amd64 + linux/arm64 binaries via mg.Deps(Go.CrossBuild),
      # then runs `docker buildx build --push` using the platforms and tags defined
      # in docker.yaml → buildxBuild. Skips push on PRs by overriding the flag.
      - name: Build and Push Docker
        run: mage docker:buildAndPush
